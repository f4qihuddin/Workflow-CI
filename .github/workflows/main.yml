name: CI/CD MLflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v3

      # Setup Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12.7"
          
      - name: Install MLflow
        run: pip install mlflow==2.19.0
          
      # Run as a mlflow project
      - name: Run mlflow project
        env:
          MLFLOW_ALLOW_FILE_STORE: true
        run: |
          export PATH="$CONDA/bin:$PATH"
          # Jalankan server MLflow di background pada port 5000
          mlflow server --host 127.0.0.1 --port 5000 &
          # Beri jeda 3 detik agar server siap menerima koneksi
          sleep 3
          # Jalankan project Anda
          mlflow run MLproject --env-manager=conda --experiment-name="coffeebeans-classification" -P n_filters=32 -P filter_size="3,3" -P activation="relu" -P input_shape="150,150,1" -P dense_1=128 -P dense_2=64
      
      # Get latest run_id
      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(ls -td mlruns/0/*/ | head -n 1 | cut -d'/' -f3)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"
          
      - name: Build Docker Model
        env:
          # Memaksa MLflow menggunakan base image dengan versi Python yang lebih aman
          MLFLOW_DOCKER_IMAGE_NAME: "mlflow-docker-container"
        run: |
          # Ambil RUN_ID
          RUN_ID=$(python -c "import mlflow; client = mlflow.MlflowClient(); exp = client.get_experiment_by_name('coffeebeans-classification'); runs = client.search_runs(experiment_ids=[exp.experiment_id], order_by=['attributes.start_time DESC'], max_results=1); print(runs[0].info.run_id) if runs else print('')")
          
          echo "RUN_ID yang berhasil diambil: $RUN_ID"
          
          if [ -z "$RUN_ID" ]; then
            echo "Error: Tidak ada RUN_ID yang ditemukan!"
            exit 1
          fi
          
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "coffeebeansclassification" --env-manager=conda --no-cache
          
      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Tag the Docker image
      - name: Tag Docker Image
        run: |
          docker tag coffeebeansclassification ${{ secrets.DOCKER_HUB_USERNAME }}/coffeebeansclassification:latest

      # Push Docker image to Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/coffeebeansclassification:latest
