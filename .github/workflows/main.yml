name: CI/CD MLflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:           # <--- Tambahkan blok ini
      contents: write

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v3

      # Setup Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12.7"
          
      - name: Install MLflow
        run: pip install mlflow==2.19.0
          
      # Run as a mlflow project
      - name: Run mlflow project
        env:
          MLFLOW_ALLOW_FILE_STORE: true
        run: |
          export PATH="$CONDA/bin:$PATH"
          # Jalankan server MLflow di background pada port 5000
          mlflow server --host 127.0.0.1 --port 5000 &
          # Beri jeda 3 detik agar server siap menerima koneksi
          sleep 3
          # Jalankan project Anda
          mlflow run MLproject --env-manager=conda --experiment-name="coffeebeans-classification" -P n_filters=32 -P filter_size="3,3" -P activation="relu" -P input_shape="150,150,1" -P dense_1=128 -P dense_2=64
      
      - name: Commit and Push MLflow Artifacts to LFS
        run: |
          RUN_ID=$(ls -td mlruns/0/*/ | head -n 1 | cut -d'/' -f3)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"
          
      # Build Docker Model
      - name: Build Docker Model
        run: |
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "coffeebeansclassification" 

      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Tag the Docker image
      - name: Tag Docker Image
        run: |
          docker tag coffeebeansclassification ${{ secrets.DOCKER_HUB_USERNAME }}/coffeebeansclassification:latest

      # Push Docker image to Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/coffeebeansclassification:latest
